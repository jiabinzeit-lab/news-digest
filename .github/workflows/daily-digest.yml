name: Daily News Digest

on:
  schedule:
    # 7:00 UTC = 9:00 CEST (夏令时, 4月-10月)
    # 8:00 UTC = 9:00 CET  (冬令时, 10月-4月)
    # 两个时间都触发，脚本内部判断柏林时间是否为9点
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            news-aggregator-mcp/package-lock.json
            telegram-push-mcp/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd news-aggregator-mcp && npm ci
          cd ../telegram-push-mcp && npm ci

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node daily-digest.mjs
