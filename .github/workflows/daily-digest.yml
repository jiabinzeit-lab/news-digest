name: Daily News Digest

on:
  schedule:
    # 早上：4:00 UTC = 6:00 CEST / 5:00 CET
    - cron: '0 4 * * *'
    # 晚上：17:00 UTC = 19:00 CEST / 18:00 CET
    - cron: '0 17 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            news-aggregator-mcp/package-lock.json
            telegram-push-mcp/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd news-aggregator-mcp && npm ci
          cd ../telegram-push-mcp && npm ci

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node daily-digest.mjs
